<style>
body{
    font-family: Arial, sans-serif;
    background:#121212;
    color:white;
    text-align:center;
    margin:0;

header{

}

h1{

.socials{
    display:flex;

.socials a{
    text-decoration:none;
    color:white;
    background:#1f1f1f;
    padding:12px 20px;
    border-radius:12px;
    transition:.2s;
}

.socials a:hover{
    background:#333;
    transform:scale(1.05);
}

.gallery{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

.image-card{
    background:#1f1f1f;
    padding:15px;
    border-radius:15px;
}

.image-card img{
    width:100%;
    border-radius:10px;
}

.download-btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#4CAF50;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.download-btn:hover{
    background:#45a049;
}
